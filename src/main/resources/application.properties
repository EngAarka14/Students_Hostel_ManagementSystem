# ===============================
# Student Hostel Management System
# Application Configuration
# ===============================

spring.application.name=student-hostel-management

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/hostel_management_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# --- Server ---
server.port=8080

# --- JWT ---
# 256-bit+ secret, replace in production and load from an environment variable
app.jwt.secret=ChangeThisSuperSecretKeyForHostelManagementSystemJWT2026!!
app.jwt.expiration-ms=86400000

# --- CORS ---
app.cors.allowed-origins=http://localhost:5173

# --- Logging ---
logging.level.org.springframework.security=INFO
logging.level.com.hostel.management=DEBUG
